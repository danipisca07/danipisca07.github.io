<div class="blog-page">
  <a routerLink="/" class="back-link">{{ 'blog.back_home' | translate }}</a>
  <h1>Blog</h1>
  <ul id="blogList">
    <li *ngFor="let post of posts" [routerLink]="['/blog', post.slug]">
      <span class="post-title">{{ post.title }}</span>
      <span class="post-date">{{ post.date }}</span>
      <span class="post-excerpt">{{ post.excerpt }}</span>
      <span class="post-read-more">{{ 'blog.read_more' | translate }}</span>
    </li>
  </ul>
</div>
